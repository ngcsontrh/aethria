name: MCP Server Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - Aethria.McpServer/**
      - Aethria.Application/**
      - Aethria.Domain/**
      - Aethria.Infrastructure/**
      - Aethria.ServiceDefaults/**
      - Directory.Packages.props
  push:
    branches:
      - main
    tags:
      - "mcpserver-v*"
    paths:
      - Aethria.McpServer/**
      - Aethria.Application/**
      - Aethria.Domain/**
      - Aethria.Infrastructure/**
      - Aethria.ServiceDefaults/**
      - Directory.Packages.props

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: Aethria.McpServer/Aethria.McpServer.csproj
  DOCKERFILE_PATH: Aethria.McpServer/Dockerfile
  IMAGE_SUFFIX: aethria-mcpserver

jobs:
  build:
    name: Build and publish MCP server image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

      - name: Set image name
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repository}/${IMAGE_SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        if: github.ref_type == 'tag'
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=match,pattern=mcpserver-(v.*),group=1

      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        if: github.ref_type != 'tag'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: false
          tags: ${{ steps.image.outputs.name }}:ci

      - name: Build and push Docker image
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
